<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | StooM</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="assets/icon.png">
    
    <meta property="og:title" content="404 - Page Not Found | StooM">
    <meta property="og:description" content="Oops! The page you're looking for has been lost in the digital void.">
    <meta property="og:image" content="https://stoom-dp.github.io/Website/assets/icon.png">
    <meta property="og:url" content="https://stoom-dp.github.io/Website/404">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="StooM">
    
    <style>
        .error-404 {
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            background: radial-gradient(circle at center, rgba(52, 152, 219, 0.03) 0%, transparent 60%);
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.3;
            animation: float-up 10s infinite linear;
        }
        
        @keyframes float-up {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            5% {
                opacity: 0.3;
            }
            95% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(52, 152, 219, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }
        
        .error-title {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.5s forwards;
        }
        
        .error-description {
            font-size: 1.2rem;
            color: var(--muted-text);
            max-width: 600px;
            margin-bottom: 2rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1s forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 2rem;
            }
            
            .error-description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="assets/icon.png" alt="StooM Logo">
                <span>StooM</span>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="about">About</a></li>
                <li><a href="downloads">Downloads</a></li>
                <li><a href="/docs">Docs</a></li>
                <li><a href="https://github.com/StooM-DP/" target="_blank">GitHub</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main class="error-404">
        <div class="particles" id="particles"></div>
        <div class="error-code">404</div>
        <h1 class="error-title">Lost in the Digital Void</h1>
        <p class="error-description">The page you requested could not be found. It may have been moved, deleted, or the URL might be incorrect. Please check the address and try again.</p>
    </main>

    <div id="footer-placeholder"></div>

    <script src="javascript/footer.js"></script>
    <script src="javascript/main.js"></script>
</body>
</html>
